name: CI

on:

  # FUTURE USE: Uncomment this section when you are ready to set up
  # Continuous Deployment (CD) to production from the main branch.
  # push:
  #   branches: [ main ]

  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }} - ${{ github.event.number }} - ${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Derive NX Base and Head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Run Linters
        run: npx nx affected -t lint
        continue-on-error: false

      - name: Run Unit Tests
        run: npx nx affected -t test --parallel=4
        continue-on-error: false

      - name: Upload Test Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Run Production Builds
        run: npx nx affected -t build --configuration=production
        continue-on-error: false

      - name: Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: CI Status
        if: always()
        run: echo "✅ CI Pipeline Passed - Linting ✓ Tests ✓ Builds ✓"

      - name: CI Failure Report
        if: failure()
        run: echo "❌ CI Pipeline Failed - Check logs above for details"
