<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fade-in">
  <div class="bg-white rounded-sm shadow-2xl w-full max-w-md overflow-hidden animate-slide-up">

    @let opt = options();

    <!-- header -->
    <div class="px-6 py-4 border-b border-gray-100 flex items-center gap-3">
      <div class="p-2 bg-red-50 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5 text-red-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900">{{ opt.title }}</h3>
    </div>

    <!-- body -->
    <div class="px-6 py-4">
      <p class="text-gray-600">{{ opt.message }}</p>
    </div>

    <!-- actions -->
    <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-sm transition-colors cursor-pointer"
      >
        {{ opt.cancelLabel }}
      </button>
      <button
        type="button"
        (click)="onConfirm()"
        class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-sm shadow-md transition-colors active:scale-95 cursor-pointer"
      >
        {{ opt.confirmLabel }}
      </button>
    </div>

  </div>
</div>
